services:
  postgres:
    image: postgres:16-alpine
    container_name: analysis-module-postgres
    environment:
      POSTGRES_DB: analysis_module
      POSTGRES_USER: analysis
      POSTGRES_PASSWORD: analysis
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analysis -d analysis_module"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  analysis-module:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_PACKAGE: "${TORCH_PACKAGE:-torch==2.7.1}"
        TORCH_INDEX_URL: "${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}"
        INSTALL_QLORA_DEPS: "${INSTALL_QLORA_DEPS:-false}"
    container_name: analysis-module-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANALYSIS_API_KEY: "${ANALYSIS_API_KEY:-demo-api-key}"
      ANALYSIS_LLM_MODE: hf
      ANALYSIS_JOB_STORE_BACKEND: postgres
      ANALYSIS_DATABASE_URL: postgresql://analysis:analysis@postgres:5432/analysis_module
      ANALYSIS_HF_BASE_MODEL: "${ANALYSIS_HF_BASE_MODEL:-Qwen/Qwen2.5-3B-Instruct}"
      ANALYSIS_HF_ADAPTER_PATH: /app/training/artifacts/qwen2.5-3b-interview-full-ru-qlora-v1
      ANALYSIS_HF_DEVICE: "${ANALYSIS_HF_DEVICE:-cpu}"
      ANALYSIS_HF_LOAD_IN_4BIT: "${ANALYSIS_HF_LOAD_IN_4BIT:-false}"
      ANALYSIS_HF_MAX_NEW_TOKENS: "${ANALYSIS_HF_MAX_NEW_TOKENS:-120}"
      ANALYSIS_HF_BATCH_SIZE: "${ANALYSIS_HF_BATCH_SIZE:-1}"
      ANALYSIS_HF_RETRY_MAX_NEW_TOKENS: "${ANALYSIS_HF_RETRY_MAX_NEW_TOKENS:-160}"
      ANALYSIS_HF_REPAIR_MAX_NEW_TOKENS: "${ANALYSIS_HF_REPAIR_MAX_NEW_TOKENS:-100}"
      ANALYSIS_LLM_FALLBACK_TO_GROUNDED: "${ANALYSIS_LLM_FALLBACK_TO_GROUNDED:-false}"
      ANALYSIS_DISABLE_LLM_ON_CPU: "${ANALYSIS_DISABLE_LLM_ON_CPU:-false}"
      ANALYSIS_WARMUP_LLM_ON_START: "${ANALYSIS_WARMUP_LLM_ON_START:-false}"
      ANALYSIS_REQUEST_TIMEOUT_SECONDS: "${ANALYSIS_REQUEST_TIMEOUT_SECONDS:-300}"
      ANALYSIS_KNOWLEDGE_LIMIT: "${ANALYSIS_KNOWLEDGE_LIMIT:-1}"
      ANALYSIS_HARD_TIMEOUT_SECONDS: "${ANALYSIS_HARD_TIMEOUT_SECONDS:-30}"
      ANALYSIS_MAX_ANSWER_LENGTH: "${ANALYSIS_MAX_ANSWER_LENGTH:-4000}"
      ANALYSIS_MAX_SESSION_ITEMS: "${ANALYSIS_MAX_SESSION_ITEMS:-20}"
      HF_HOME: /app/.hf-cache
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
    volumes:
      - huggingface_cache:/app/.hf-cache
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/assessment/v1/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 180s

volumes:
  postgres_data:
  huggingface_cache:
